<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background circle with deep ink dark -->
  <circle cx="256" cy="256" r="240" fill="#1A1F2C" />
  
  <!-- Outer accent ring for a premium look -->
  <circle cx="256" cy="256" r="224" fill="none" stroke="#FDFCF7" stroke-width="8" opacity="0.15" />
  
  <!-- Stylized Serif Letter S in the center -->
  <text x="256" y="345" 
        font-family="Georgia, 'Playfair Display', serif" 
        font-size="280" 
        font-weight="900" 
        fill="#FDFCF7" 
        text-anchor="middle">S</text>
</svg>